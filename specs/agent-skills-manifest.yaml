# Customer Success FTE - Agent Skills Manifest
# Defines reusable capabilities the FTE agent can invoke

skills:
  - name: knowledge_retrieval
    description: Search and retrieve relevant product documentation
    when_to_use: Customer asks product questions, how-to guidance, feature inquiries
    inputs:
      - name: query
        type: string
        description: Search query text
      - name: max_results
        type: integer
        default: 5
        description: Maximum number of results to return
    outputs:
      - name: results
        type: string
        description: Formatted documentation snippets with relevance info
    constraints:
      - Max 5 results per query
      - If no results after 2 attempts, escalate to human
    tool: search_knowledge_base

  - name: sentiment_analysis
    description: Analyze customer sentiment from their message
    when_to_use: Every incoming customer message
    inputs:
      - name: message
        type: string
        description: Customer message text
    outputs:
      - name: sentiment_score
        type: float
        description: Score from 0.0 (very negative) to 1.0 (very positive)
      - name: confidence
        type: float
        description: Confidence level of the sentiment analysis
    constraints:
      - If score < 0.3, trigger escalation
      - Track sentiment trend across conversation
    tool: update_customer_sentiment

  - name: escalation_decision
    description: Decide whether to escalate to human support
    when_to_use: After analyzing each customer message and generating response
    inputs:
      - name: conversation_context
        type: object
        description: Full conversation history and metadata
      - name: sentiment_trend
        type: array
        description: Sentiment scores over the conversation
      - name: current_message
        type: string
        description: Latest customer message
    outputs:
      - name: should_escalate
        type: boolean
        description: Whether to escalate
      - name: reason
        type: string
        description: Escalation reason code
    triggers:
      - keyword: ["lawyer", "legal", "sue", "attorney", "GDPR"]
        reason: legal_compliance
      - keyword: ["human", "agent", "representative", "manager"]
        reason: customer_request
      - keyword: ["refund", "money back", "charged twice"]
        reason: refund_request
      - condition: sentiment_score < 0.3
        reason: negative_sentiment
      - condition: profanity_detected
        reason: negative_sentiment
      - condition: failed_searches >= 2
        reason: info_not_found
      - keyword: ["hacked", "unauthorized", "breach", "compromised"]
        reason: security_incident
      - condition: pricing_question
        reason: pricing_inquiry
    tool: escalate_to_human

  - name: channel_adaptation
    description: Format response appropriately for the target channel
    when_to_use: Before sending any response to the customer
    inputs:
      - name: response_text
        type: string
        description: Raw response from the agent
      - name: target_channel
        type: string
        enum: [email, whatsapp, web_form]
        description: Channel to format for
    outputs:
      - name: formatted_response
        type: string
        description: Response formatted for the specific channel
    channel_rules:
      email:
        tone: formal
        max_length: 500 words
        includes: [greeting, signature, ticket_reference]
        format: "Hi {name},\n\n{response}\n\nBest regards,\nFlowBoard Support Team"
      whatsapp:
        tone: conversational
        max_length: 300 characters preferred, 1600 max
        includes: [human_opt_out_message]
        format: "{response}\n\nReply for help or type 'human' for live support."
      web_form:
        tone: semi-formal
        max_length: 300 words
        includes: [support_portal_link]
        format: "{response}\n\n---\nNeed more help? Visit our support portal."
    tool: send_response

  - name: customer_identification
    description: Identify and merge customer records across channels
    when_to_use: On every incoming message before any processing
    inputs:
      - name: message_metadata
        type: object
        description: "Message metadata (email, phone, name, etc.)"
    outputs:
      - name: customer_id
        type: string
        description: Unified customer identifier
      - name: merged_history
        type: array
        description: Combined history from all channels
    identification_rules:
      - identifier: email
        channels: [email, web_form]
        primary: true
      - identifier: phone
        channels: [whatsapp]
        linked_via: customer_identifiers table
    cross_channel_matching:
      - If email matches existing customer, merge
      - If phone matches existing customer_identifier, link
      - If new, create customer record
    tool: get_customer_history

  - name: ticket_management
    description: Create and track support tickets
    when_to_use: Start of every customer interaction
    inputs:
      - name: customer_id
        type: string
      - name: issue
        type: string
      - name: channel
        type: string
        enum: [email, whatsapp, web_form]
      - name: priority
        type: string
        enum: [low, medium, high, urgent]
        default: medium
      - name: category
        type: string
        enum: [general, technical, billing, feedback, bug_report]
    outputs:
      - name: ticket_id
        type: string
    lifecycle:
      - open -> processing -> resolved -> closed
      - open -> processing -> escalated
    tool: create_ticket
